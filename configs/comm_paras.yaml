# 全局通用参数（common parameters）。
#
# 与机器人本体解耦（本体逐关节约束见 robot_3axis.yaml）；此处收拢跨模块 / 演示 /
# 示意等共享设置，按用途分节。新增全局参数在此加新节即可。

# 约束开关：true=求解时启用该约束（关闭仅表示不施加，上/下界数据仍可存在）。
# 缺省项按 true。经 load_constraint_flags() 读入 SolveOptions.flags。
constraints:
  velocity: true              # 轴向速度 |q̇|≤vmax
  acceleration: false          # 轴向加速度 |q̈|≤amax
  jerk: true                  # 轴向 jerk |q⃛|≤jmax（3 阶）
  torque: false                # 关节力矩 τ_min≤τ≤τ_max（恒定盒式）
  speed_torque: true           # 速度相关力矩（t–n）；物理参数 κ/Fv/Fc 在 robot_ur5.yaml 逐关节
  tcp_velocity: true          # TCP 位置速度模 ‖ṗ‖≤v_tcp_max
  tcp_angular_velocity: false  # TCP 姿态角速度模 ‖ω‖≤w_tcp_max

# 目标函数附加项。
objective:
  # 非静止（c-ZOH）段相邻 c 控制跳变的平滑惩罚权重 λ：目标 += λ·Σ|c_i−c_{i+1}|。
  #   经 LP 不等式 p_i≥|c_i−c_{i+1}| 实现；仅作用于非零速段（静止段用 jerk-ZOH，c 发散不参与）。
  #   λ 应为**小系数**，使平滑项不主导时间最优目标；0 关闭。经 load_smooth_c_weight() 读入。
  smooth_c_weight: 0.005

# 注：论文 Fig.4（区间解析插值）现由**唯一测试用例**的求解结果直接重构出图
# （viz.plot_interp_profiles(data, profile)），不再单独造示意数据/参数节。
