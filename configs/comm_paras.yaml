# 全局通用参数（common parameters）。
#
# 与机器人本体解耦（本体逐关节约束见 robot_3axis.yaml）；此处收拢跨模块 / 演示 /
# 示意等共享设置，按用途分节。新增全局参数在此加新节即可。

# 约束开关：true=求解时启用该约束（关闭仅表示不施加，上/下界数据仍可存在）。
# 缺省项按 true。经 load_constraint_flags() 读入 SolveOptions.flags。
constraints:
  velocity: true              # 轴向速度 |q̇|≤vmax
  acceleration: true          # 轴向加速度 |q̈|≤amax
  jerk: true                  # 轴向 jerk |q⃛|≤jmax（3 阶）
  torque: false                # 关节力矩 τ_min≤τ≤τ_max
  tcp_velocity: true          # TCP 位置速度模 ‖ṗ‖≤v_tcp_max
  tcp_angular_velocity: true  # TCP 姿态角速度模 ‖ω‖≤w_tcp_max

# 论文 Fig.4 复现示意（区间解析插值 Prop.1 + Prop.2）参数。
fig4_example:
  # 头部“恒定参数 jerk ⃛u”的区间宽度 N_s（jerk 零阶保持 / 静止段）。
  #   N_s=2 → 静止段跨 2 个区间、含 3 个网格点 u0,u1,u2（⃛u≡κ 恒定）。
  n_stat: 1
  du: 1.0          # 网格区间宽度 Δ（均匀）
  a_head: 0.6      # 静止段末端目标 a(u_{N_s})：a∝(u-u_s)^{4/3} 由此定标
  n_sub: 80        # 每区间细采样点数（画连续曲线用）
  # 尾部各非静止区间的 c 零阶保持控制值（长度 = 非静止区间数）。
  c_tail: [0.20, 0.05, -0.18]
